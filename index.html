<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor PRO+</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }
    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.05) 0%, transparent 50%),
                  #0a0a12;
    }
    .loader {
      position: relative;
      z-index: 1;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }
    .loader .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #00ff88, #00cc66);
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 800;
      color: #0a0a12;
      box-shadow: 0 0 60px rgba(0,255,136,0.2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0,255,136,0.2); }
      50% { box-shadow: 0 0 80px rgba(0,255,136,0.3); }
    }
    .loader h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #f0eaff;
    }
    .loader h1 span {
      background: linear-gradient(135deg, #00ff88, #00cc66);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .loader p {
      color: #b8a6d6;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }
    .loader .spinner {
      width: 40px;
      height: 40px;
      margin: 1.5rem auto 0;
      border: 3px solid rgba(0,255,136,0.15);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="loader">
    <div class="logo">⚡</div>
    <h1>Gestor <span>PRO+</span></h1>
    <p>⚡ CARREGANDO SISTEMA ⚡</p>
    <div class="spinner"></div>
  </div>
  <script type="module">
    import { initAuth, getCurrentUser } from './js/auth.js';
    async function redirect() {
      await initAuth();
      const user = getCurrentUser();
      if (user) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'login.html';
      }
    }
    redirect();
  </script>
</body>
</html>
