<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galego Cell Manager</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080705;
      color: #fff8e7;
      font-family: 'DM Sans', sans-serif;
    }
    .loader { text-align: center; }
    .loader .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(217, 171, 67, 0.2);
      border-top-color: #d9ab43;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader h1 { color: #d9ab43; font-size: 1.5rem; }
    .loader p { color: #b8aa8d; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h1>Galego Cell</h1>
    <p>Carregando sistema...</p>
  </div>
  <script type="module">
    import { initAuth, getCurrentUser } from './js/auth.js';
    async function redirect() {
      await initAuth();
      const user = getCurrentUser();
      if (user) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'login.html';
      }
    }
    redirect();
  </script>
</body>
</html>
