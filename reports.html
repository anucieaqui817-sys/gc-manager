<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatórios - Galego Cell</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-purple: #b400ff;
      --neon-pink: #ff00c8;
      --neon-cyan: #00d4ff;
      --neon-green: #00ff88;
      --neon-gold: #ffd700;
      --neon-red: #ff3366;
      --bg: #0a0a12;
      --bg-card: rgba(16, 14, 30, 0.88);
      --border: rgba(180, 0, 255, 0.15);
      --text: #f0eaff;
      --text-muted: #b8a6d6;
      --text-dim: #6a5a8a;
      --shadow: rgba(180, 0, 255, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 3px; }

    .sidebar {
      width: 220px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
    }
    .sidebar-brand {
      padding: 0 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .sidebar-brand .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0a0a12;
    }
    .sidebar-brand h1 { font-size: 1.1rem; font-weight: 800; }
    .sidebar-brand h1 span {
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sidebar-nav {
      flex: 1;
      padding: 0 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }
    .sidebar-nav a:hover { background: rgba(180, 0, 255, 0.08); color: var(--text); }
    .sidebar-nav a.active {
      background: rgba(180, 0, 255, 0.12);
      color: var(--neon-purple);
      border-right: 3px solid var(--neon-purple);
    }
    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer a {
      color: var(--neon-red);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .sidebar-footer a:hover { color: var(--neon-gold); }

    .main {
      flex: 1;
      padding: 1.5rem;
      overflow-x: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 { font-size: 1.5rem; font-weight: 800; }
    .header h1 span { color: var(--neon-purple); }
    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 0.8rem;
      border: none;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'DM Sans', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      color: #0a0a12;
    }
    .btn-primary:hover {
      box-shadow: 0 0 40px rgba(180, 0, 255, 0.3);
      transform: translateY(-2px);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
    }
    .card:hover {
      border-color: rgba(180, 0, 255, 0.25);
      box-shadow: 0 0 30px var(--shadow);
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--neon-cyan);
    }
    .card .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 1.2rem 1.5rem;
      transition: all 0.3s ease;
      text-align: center;
    }
    .stat-card:hover {
      border-color: var(--neon-purple);
      box-shadow: 0 0 30px var(--shadow);
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      background: linear-gradient(135deg, var(--neon-gold), #ff8800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-group { margin-bottom: 1rem; }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .input-field {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: var(--neon-purple);
      box-shadow: 0 0 30px var(--shadow);
    }

    .detail-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-item .label { color: var(--text-muted); font-size: 0.9rem; }
    .detail-item .value { font-weight: 600; font-family: 'Space Mono', monospace; color: var(--neon-gold); }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
    }

    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 1rem 0; }
      .sidebar-brand h1, .sidebar-nav a span, .sidebar-footer span { display: none; }
      .sidebar-nav a { justify-content: center; padding: 0.7rem; }
      .sidebar-brand { justify-content: center; padding: 0; }
      .main { padding: 1rem; }
      .card .grid-2 { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">GC</div>
      <h1>Galego <span>Cell</span></h1>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html">📊 <span>Dashboard</span></a>
      <a href="/services.html">🔧 <span>Ordens de Serviço</span></a>
      <a href="/products.html">📦 <span>Produtos</span></a>
      <a href="/clients.html">👤 <span>Clientes</span></a>
      <a href="/sales.html">💰 <span>Vendas</span></a>
      <a href="/settings.html">⚙️ <span>Configurações</span></a>
      <a href="/reports.html" class="active">📈 <span>Relatórios</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logout-btn">🚪 <span>Sair</span></a>
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <h1>📈 <span>Relatórios</span></h1>
    </div>

    <!-- Filtros -->
    <div class="card">
      <h2>📅 Período</h2>
      <div class="grid-2">
        <div class="input-group">
          <label for="report-start">Data Início</label>
          <input type="date" id="report-start" class="input-field" />
        </div>
        <div class="input-group">
          <label for="report-end">Data Fim</label>
          <input type="date" id="report-end" class="input-field" />
        </div>
      </div>
      <button class="btn btn-primary" id="btn-generate" style="width:100%;justify-content:center;">📊 Gerar Relatório</button>
    </div>

    <!-- Resumo -->
    <div class="stats" id="report-summary">
      <div class="stat-card">
        <div class="value" id="report-total">R$ 0</div>
        <div class="label">💰 Faturamento</div>
      </div>
      <div class="stat-card">
        <div class="value" id="report-count" style="background:linear-gradient(135deg, var(--neon-cyan), #0088ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">0</div>
        <div class="label">📋 Transações</div>
      </div>
    </div>

    <!-- Detalhes -->
    <div class="card">
      <h2>📋 Detalhamento</h2>
      <div id="report-details">
        <div class="empty-state">📊 Selecione um período e clique em "Gerar Relatório".</div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initApp, utils, handleLogout } from './js/app.js';
    import { initAuth, getCurrentUser } from './js/auth.js';
    import { getSalesReport } from './js/reports.js';

    const startInput = document.getElementById('report-start');
    const endInput = document.getElementById('report-end');
    const today = new Date();
    const lastMonth = new Date(today);
    lastMonth.setMonth(lastMonth.getMonth() - 1);
    startInput.value = lastMonth.toISOString().split('T')[0];
    endInput.value = today.toISOString().split('T')[0];

    document.getElementById('btn-generate').addEventListener('click', async () => {
      const start = startInput.value;
      const end = endInput.value;
      if (!start || !end) { alert('⚠️ Selecione as datas.'); return; }

      const sales = await getSalesReport(start, end);
      document.getElementById('report-total').textContent = utils.formatCurrency(sales?.total || 0);
      document.getElementById('report-count').textContent = sales?.count || 0;

      const details = document.getElementById('report-details');
      if (!sales || sales.count === 0) {
        details.innerHTML = '<div class="empty-state">📊 Nenhuma venda no período selecionado.</div>';
        return;
      }

      let itemsHtml = sales.sales.map(s => `
        <div class="detail-item">
          <span class="label">${s.clientName || 'Balcão'} • ${utils.formatDate(s.createdAt)}</span>
          <span class="value">${utils.formatCurrency(s.total)}</span>
        </div>
      `).join('');

      details.innerHTML = `
        <div style="margin-bottom:0.5rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
          <span style="color:var(--text-muted);">Total de vendas: <strong style="color:var(--text);">${sales.count}</strong></span>
          <span style="color:var(--text-muted);">Faturamento: <strong style="color:var(--neon-gold);font-family:'Space Mono',monospace;">${utils.formatCurrency(sales.total)}</strong></span>
        </div>
        <div style="border-top:1px solid var(--border);margin-top:0.5rem;padding-top:0.5rem;">
          ${itemsHtml}
        </div>
      `;
    });

    // Carregar relatório inicial
    document.getElementById('btn-generate').click();

    async function init() {
      await initAuth();
      const user = getCurrentUser();
      if (!user) return;
      initApp();
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
    }
    init();
  </script>

</body>
</html>
