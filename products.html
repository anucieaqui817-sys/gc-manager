<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produtos - Gestor PRO+</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-green: #00ff88;
      --neon-cyan: #00d4ff;
      --neon-gold: #ffd700;
      --neon-red: #ff3366;
      --bg: #0a0a12;
      --bg-card: rgba(16, 14, 30, 0.88);
      --border: rgba(0, 255, 136, 0.12);
      --text: #f0eaff;
      --text-muted: #b8a6d6;
      --text-dim: #6a5a8a;
      --shadow: rgba(0, 255, 136, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 3px; }

    .sidebar {
      width: 220px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
    }
    .sidebar-brand {
      padding: 0 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .sidebar-brand .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0a0a12;
    }
    .sidebar-brand h1 { font-size: 1.1rem; font-weight: 800; }
    .sidebar-brand h1 span {
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sidebar-nav {
      flex: 1;
      padding: 0 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }
    .sidebar-nav a:hover { background: rgba(0,255,136,0.06); color: var(--text); }
    .sidebar-nav a.active {
      background: rgba(0,255,136,0.08);
      color: var(--neon-green);
      border-right: 3px solid var(--neon-green);
    }
    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer a {
      color: var(--neon-red);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .sidebar-footer a:hover { color: var(--neon-gold); }

    .main {
      flex: 1;
      padding: 1.5rem;
      overflow-x: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 { font-size: 1.5rem; font-weight: 800; }
    .header h1 span { color: var(--neon-green); }
    .header-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 0.8rem;
      border: none;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      color: #0a0a12;
    }
    .btn-primary:hover {
      box-shadow: 0 0 40px rgba(0,255,136,0.3);
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--neon-green);
      box-shadow: 0 0 30px var(--shadow);
    }
    .btn-danger {
      background: rgba(255,51,102,0.15);
      color: var(--neon-red);
      border: 1px solid rgba(255,51,102,0.2);
    }
    .btn-danger:hover {
      background: rgba(255,51,102,0.25);
    }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }

    .input-field {
      padding: 0.6rem 1rem;
      border-radius: 0.8rem;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all 0.3s ease;
      width: 200px;
    }
    .input-field:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 30px var(--shadow);
    }
    .input-field::placeholder { color: var(--text-dim); }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 1.2rem;
      transition: all 0.3s ease;
      text-align: center;
    }
    .product-card:hover {
      border-color: rgba(0,255,136,0.3);
      box-shadow: 0 0 30px var(--shadow);
      transform: translateY(-4px);
    }
    .product-card .image {
      width: 100%;
      height: 130px;
      border-radius: 0.8rem;
      object-fit: cover;
      background: rgba(10, 10, 20, 0.4);
      margin-bottom: 0.8rem;
    }
    .product-card .name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .product-card .category {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .product-card .price {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--neon-gold);
      margin: 0.3rem 0;
    }
    .product-card .stock {
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .product-card .stock.low { color: var(--neon-red); }
    .product-card .actions {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.5rem;
      justify-content: center;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
      grid-column: 1/-1;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.5rem; }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal.active {
      opacity: 1;
      visibility: visible;
    }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    .modal.active .modal-content { transform: scale(1); }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 1.2rem; font-weight: 700; }
    .modal-header h2 span { color: var(--neon-green); }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s ease;
    }
    .modal-close:hover { color: var(--text); }

    .input-group { margin-bottom: 1rem; }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .input-group .input-field {
      width: 100%;
      padding: 0.7rem 1rem;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 1rem 0; }
      .sidebar-brand h1, .sidebar-nav a span, .sidebar-footer span { display: none; }
      .sidebar-nav a { justify-content: center; padding: 0.7rem; }
      .sidebar-brand { justify-content: center; padding: 0; }
      .main { padding: 1rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .input-field { width: 150px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .modal-content { padding: 1.2rem; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr 1fr; }
      .product-card .image { height: 100px; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">⚡</div>
      <h1>Gestor <span>PRO+</span></h1>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 <span>Dashboard</span></a>
      <a href="services.html">🔧 <span>Ordens de Serviço</span></a>
      <a href="products.html" class="active">📦 <span>Produtos</span></a>
      <a href="clients.html">👤 <span>Clientes</span></a>
      <a href="sales.html">💰 <span>Vendas</span></a>
      <a href="fornecedores.html">📦 <span>Fornecedores</span></a>
      <a href="admin.html">👑 <span>Master PRO+</span></a>
      <a href="settings.html">⚙️ <span>Configurações</span></a>
      <a href="reports.html">📈 <span>Relatórios</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logout-btn">🚪 <span>Sair</span></a>
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <h1>📦 <span>Produtos</span></h1>
      <div class="header-actions">
        <button class="btn btn-primary" id="btn-new-product">+ Novo Produto</button>
        <input type="text" id="product-search" class="input-field" placeholder="🔍 Buscar..." />
      </div>
    </div>
    <div class="products-grid" id="products-grid">
      <div class="empty-state"><div class="icon">📦</div><p>Carregando...</p></div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="product-modal-title">Novo <span>Produto</span></h2>
        <button class="modal-close" id="product-modal-close">✕</button>
      </div>
      <form id="product-form">
        <div class="input-group">
          <label for="product-name">Nome *</label>
          <input type="text" id="product-name" class="input-field" placeholder="Nome do produto" required />
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label for="product-category">Categoria</label>
            <input type="text" id="product-category" class="input-field" placeholder="Acessórios, Peças..." />
          </div>
          <div class="input-group">
            <label for="product-brand">Marca</label>
            <input type="text" id="product-brand" class="input-field" placeholder="Marca" />
          </div>
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label for="product-price">💰 Preço *</label>
            <input type="number" id="product-price" class="input-field" placeholder="0.00" step="0.01" required />
          </div>
          <div class="input-group">
            <label for="product-stock">📊 Estoque *</label>
            <input type="number" id="product-stock" class="input-field" placeholder="0" min="0" required />
          </div>
        </div>
        <div class="input-group">
          <label for="product-image">🖼️ URL da Imagem</label>
          <input type="url" id="product-image" class="input-field" placeholder="https://..." />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">💾 Salvar</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initApp, subscribe, getState, utils, handleLogout } from './js/app.js';
    import { initAuth, getCurrentUser } from './js/auth.js';
    import { createProduct, updateProduct, deleteProduct } from './js/products.js';
    import { verificarPlano } from './js/plano.js';

    const modal = document.getElementById('product-modal');
    const form = document.getElementById('product-form');
    let editingId = null;

    function renderProducts(filter = '') {
      const products = getState('products');
      const filtered = filter ? products.filter(p => 
        p.name?.toLowerCase().includes(filter.toLowerCase()) ||
        p.category?.toLowerCase().includes(filter.toLowerCase())
      ) : products;
      const container = document.getElementById('products-grid');
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>Nenhum produto encontrado.</p></div>`;
        return;
      }
      container.innerHTML = filtered.map(p => `
        <div class="product-card">
          <img class="image" src="${p.image || 'https://via.placeholder.com/200x130/1a1a2e/6a5a8a?text=Produto'}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200x130/1a1a2e/6a5a8a?text=Produto'" />
          <div class="name">${p.name}</div>
          <div class="category">${p.category || 'Sem categoria'}</div>
          <div class="price">${utils.formatCurrency(p.price)}</div>
          <div class="stock ${(p.stock || 0) <= 5 ? 'low' : ''}">${p.stock || 0} unidades</div>
          <div class="actions">
            <button class="btn btn-secondary btn-sm btn-edit" data-id="${p.id}">✏️</button>
            <button class="btn btn-danger btn-sm btn-delete" data-id="${p.id}">🗑️</button>
          </div>
        </div>
      `).join('');
      container.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.id)));
      container.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', async () => {
        if (!confirm('Excluir este produto?')) return;
        const result = await deleteProduct(btn.dataset.id);
        if (result.success) { alert('Produto excluído!'); renderProducts(document.getElementById('product-search').value); }
        else alert('Erro: ' + result.error);
      }));
    }

    async function openEditModal(id) {
      editingId = id;
      const products = getState('products');
      const product = products.find(p => p.id === id);
      if (!product) return;
      document.getElementById('product-modal-title').innerHTML = 'Editar <span>Produto</span>';
      document.getElementById('product-name').value = product.name || '';
      document.getElementById('product-category').value = product.category || '';
      document.getElementById('product-brand').value = product.brand || '';
      document.getElementById('product-price').value = product.price || '';
      document.getElementById('product-stock').value = product.stock || '';
      document.getElementById('product-image').value = product.image || '';
      modal.classList.add('active');
    }

    document.getElementById('btn-new-product').addEventListener('click', () => {
      editingId = null;
      document.getElementById('product-modal-title').innerHTML = 'Novo <span>Produto</span>';
      form.reset();
      modal.classList.add('active');
    });

    document.getElementById('product-modal-close').addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById('product-name').value.trim(),
        category: document.getElementById('product-category').value.trim(),
        brand: document.getElementById('product-brand').value.trim(),
        price: parseFloat(document.getElementById('product-price').value) || 0,
        stock: parseInt(document.getElementById('product-stock').value) || 0,
        image: document.getElementById('product-image').value.trim()
      };
      let result;
      if (editingId) result = await updateProduct(editingId, data);
      else result = await createProduct(data);
      if (result.success) {
        modal.classList.remove('active');
        alert(editingId ? 'Produto atualizado!' : 'Produto criado!');
        renderProducts(document.getElementById('product-search').value);
      } else alert('Erro: ' + result.error);
    });

    document.getElementById('product-search').addEventListener('input', (e) => renderProducts(e.target.value));

    async function init() {
      await initAuth();
      const user = getCurrentUser();
      if (!user) return;
      const plano = await verificarPlano();
      if (plano.status === 'expirado') {
        alert('⚠️ Seu plano expirou! Contrate um novo plano.');
        window.location.href = 'plano.html';
        return;
      }
      initApp();
      subscribe('products', () => renderProducts(document.getElementById('product-search').value));
      renderProducts('');
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
    }
    init();
  </script>

</body>
</html>
