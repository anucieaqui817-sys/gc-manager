<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Gestor PRO+</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-green: #00ff88;
      --neon-purple: #b400ff;
      --neon-pink: #ff00c8;
      --neon-cyan: #00d4ff;
      --neon-gold: #ffd700;
      --neon-red: #ff3366;
      --bg: #0a0a12;
      --bg-card: rgba(16, 14, 30, 0.92);
      --border: rgba(0, 255, 136, 0.2);
      --text: #f0eaff;
      --text-muted: #b8a6d6;
      --text-dim: #6a5a8a;
      --shadow: rgba(0, 255, 136, 0.15);
      --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.05) 0%, transparent 50%),
                  #0a0a12;
    }
    .bg-animated::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300ff88' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.6;
    }
    .circle {
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(60px);
      animation: floatGlow 8s ease-in-out infinite alternate;
    }
    .circle-1 { width: 400px; height: 400px; top: -120px; right: -120px; background: radial-gradient(circle, rgba(0,255,136,0.15), transparent 70%); }
    .circle-2 { width: 350px; height: 350px; bottom: -100px; left: -100px; background: radial-gradient(circle, rgba(0,212,255,0.10), transparent 70%); animation-delay: 2s; }
    .circle-3 { width: 200px; height: 200px; top: 40%; left: 50%; background: radial-gradient(circle, rgba(0,255,136,0.08), transparent 70%); animation-delay: 4s; }
    @keyframes floatGlow {
      0% { transform: translate(0,0) scale(1); opacity: 0.5; }
      100% { transform: translate(40px,-50px) scale(1.3); opacity: 1; }
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
      animation: fadeNeon 0.8s ease both;
    }
    @keyframes fadeNeon {
      from { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 60px rgba(0,255,136,0.04);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 2rem;
      padding: 1px;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan), var(--neon-green));
      background-size: 300% 300%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: borderGlow 4s ease-in-out infinite;
      pointer-events: none;
      opacity: 0.6;
    }
    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .login-card:hover {
      border-color: rgba(0,255,136,0.3);
      box-shadow: 0 50px 100px rgba(0,0,0,0.7), 0 0 80px rgba(0,255,136,0.06);
    }

    .logo-area { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      border-radius: 1.5rem;
      font-size: 2rem;
      font-weight: 800;
      color: #0a0a12;
      margin-bottom: 0.8rem;
      box-shadow: 0 12px 40px rgba(0,255,136,0.25), 0 0 60px rgba(0,255,136,0.1);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 12px 40px rgba(0,255,136,0.25), 0 0 60px rgba(0,255,136,0.1); }
      50% { box-shadow: 0 12px 60px rgba(0,255,136,0.4), 0 0 100px rgba(0,255,136,0.2); }
    }
    .logo-area h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .logo-area h1 span {
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-area p {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      margin-top: 0.1rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--neon-green), transparent);
      opacity: 0.3;
      animation: lineGlow 3s ease-in-out infinite;
    }
    @keyframes lineGlow {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }
    .divider-text {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      font-weight: 600;
    }

    .input-group { margin-bottom: 1.2rem; }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--neon-cyan);
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px rgba(0,212,255,0.1);
    }
    .input-field-wrapper { position: relative; }
    .input-field-wrapper .icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      opacity: 0.5;
      pointer-events: none;
      transition: all var(--transition);
    }
    .input-field-wrapper:focus-within .icon { opacity: 1; filter: drop-shadow(0 0 8px var(--neon-cyan)); }
    .input-field {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 3rem;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid var(--border);
      border-radius: 1rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all var(--transition);
    }
    .input-field::placeholder { color: var(--text-dim); }
    .input-field:focus {
      border-color: var(--neon-green);
      background: rgba(10,10,20,0.85);
      box-shadow: 0 0 0 4px rgba(0,255,136,0.08), 0 0 30px rgba(0,255,136,0.04);
    }
    .input-field:focus + .icon { color: var(--neon-green); filter: drop-shadow(0 0 12px var(--neon-green)); }

    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0.5rem 0 1.5rem 0;
      font-size: 0.8rem;
    }
    .options-row label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: color var(--transition);
    }
    .options-row label:hover { color: var(--neon-cyan); }
    .options-row input[type="checkbox"] {
      accent-color: var(--neon-green);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .options-row a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all var(--transition);
      font-weight: 500;
      text-shadow: 0 0 20px rgba(0,212,255,0.1);
    }
    .options-row a:hover { color: var(--neon-green); text-shadow: 0 0 30px rgba(0,255,136,0.3); }

    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      border: none;
      border-radius: 1rem;
      color: #0a0a12;
      font-weight: 700;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0,255,136,0.2), 0 0 40px rgba(0,255,136,0.05);
      letter-spacing: 0.04em;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
      pointer-events: none;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 1rem;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan), var(--neon-green));
      background-size: 200% 200%;
      z-index: -1;
      animation: btnBorderGlow 3s ease-in-out infinite;
      opacity: 0.6;
      filter: blur(4px);
    }
    @keyframes btnBorderGlow {
      0% { background-position: 0% 50%; opacity: 0.4; }
      50% { background-position: 100% 50%; opacity: 0.8; }
      100% { background-position: 0% 50%; opacity: 0.4; }
    }
    .btn-login:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 50px rgba(0,255,136,0.3), 0 0 60px rgba(0,255,136,0.15);
    }
    .btn-login:active { transform: translateY(0) scale(0.98); }

    .footer-links {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      transition: all var(--transition);
    }
    .footer-links a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all var(--transition);
      font-weight: 500;
      text-shadow: 0 0 20px rgba(0,212,255,0.05);
    }
    .footer-links a:hover { color: var(--neon-gold); text-shadow: 0 0 30px rgba(255,215,0,0.3); }
    .footer-links .dot { margin: 0 0.6rem; opacity: 0.3; color: var(--neon-green); }
    .footer-links .brand {
      display: block;
      margin-top: 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      opacity: 0.5;
    }

    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 360px;
    }
    .toast {
      padding: 0.8rem 1.2rem;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 1rem;
      color: var(--text);
      font-size: 0.85rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      animation: slideUp 0.4s ease;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .toast-success { border-color: rgba(0,255,136,0.3); }
    .toast-error { border-color: rgba(255,51,102,0.3); }
    .toast-warning { border-color: rgba(255,215,0,0.3); }
    @keyframes slideUp {
      from { transform: translateY(30px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @media (max-width: 480px) {
      .login-card { padding: 1.8rem 1.2rem; border-radius: 1.5rem; }
      .logo-icon { width: 60px; height: 60px; font-size: 1.6rem; }
      .logo-area h1 { font-size: 1.3rem; }
      .options-row { font-size: 0.7rem; flex-wrap: wrap; gap: 0.5rem; }
      .btn-login { padding: 0.8rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="bg-animated"></div>
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>

  <div class="toast-container" id="toast-container"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">⚡</div>
        <h1>Gestor <span>PRO+</span></h1>
        <p>SISTEMA DE GESTÃO</p>
      </div>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">✦ Acesse sua conta ✦</span>
        <span class="divider-line"></span>
      </div>

      <form id="login-form">
        <div class="input-group">
          <label for="email">📧 E-mail</label>
          <div class="input-field-wrapper">
            <input type="email" id="email" class="input-field" placeholder="seu@email.com" required />
            <span class="icon">📧</span>
          </div>
        </div>

        <div class="input-group">
          <label for="password">🔒 Senha</label>
          <div class="input-field-wrapper">
            <input type="password" id="password" class="input-field" placeholder="••••••••" required />
            <span class="icon">🔒</span>
          </div>
        </div>

        <div class="options-row">
          <label><input type="checkbox" id="remember" /> Lembrar-me</label>
          <a href="#" id="forgot-password">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn-login">✦ ENTRAR ✦</button>
      </form>

      <div class="footer-links">
        <span>⚡ Não tem uma conta?</span>
        <a href="#" id="register-link">Criar conta</a>
        <span class="dot">✦</span>
        <a href="#">Suporte</a>
        <span class="brand">Gestor PRO+ © 2024 • Sistema de Gestão Empresarial</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { loginUser, registerUser, resetPassword, initAuth } from './js/auth.js';
    import { criarUsuarioTeste } from './js/plano.js';

    const toastContainer = document.getElementById('toast-container');

    function showToast(message, type = 'success') {
      const icons = { success: '✅', error: '❌', warning: '⚡' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    const form = document.getElementById('login-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const result = await loginUser(email, password);
      if (result.success) {
        showToast('✅ Login realizado com sucesso!');
        setTimeout(() => window.location.href = 'dashboard.html', 600);
      } else {
        showToast('❌ ' + result.error, 'error');
      }
    });

    document.getElementById('forgot-password').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if (!email) { showToast('⚠️ Digite seu e-mail primeiro.', 'warning'); return; }
      const result = await resetPassword(email);
      if (result.success) {
        showToast('📨 E-mail de recuperação enviado!');
      } else {
        showToast('❌ ' + result.error, 'error');
      }
    });

    document.getElementById('register-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = prompt('📧 Digite seu e-mail para criar uma conta:');
      if (!email) return;
      const password = prompt('🔐 Digite uma senha (mínimo 6 caracteres):');
      if (!password || password.length < 6) {
        showToast('⚠️ A senha deve ter pelo menos 6 caracteres.', 'warning');
        return;
      }
      const result = await registerUser(email, password);
      if (result.success) {
        await criarUsuarioTeste(result.user.uid, email);
        showToast('🎉 Conta criada! Teste grátis de 15 dias ativado!');
        setTimeout(() => window.location.href = 'perfil-empresa.html', 800);
      } else {
        showToast('❌ ' + result.error, 'error');
      }
    });

    initAuth('dashboard.html');
  </script>

</body>
</html>
