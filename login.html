<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Galego Cell Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       TEMA NEON - CORES
       ============================================================ */
    :root {
      --neon-purple: #b400ff;
      --neon-pink: #ff00c8;
      --neon-cyan: #00d4ff;
      --neon-green: #00ff88;
      --neon-gold: #ffd700;
      --neon-red: #ff3366;
      --neon-blue: #4488ff;
      --neon-orange: #ff8800;
      
      --bg-primary: #0a0a12;
      --bg-card: rgba(16, 14, 30, 0.92);
      --border-color: rgba(180, 0, 255, 0.25);
      --border-hover: rgba(180, 0, 255, 0.5);
      --text-primary: #f0eaff;
      --text-muted: #b8a6d6;
      --text-dim: #6a5a8a;
      --shadow-purple: rgba(180, 0, 255, 0.3);
      --shadow-pink: rgba(255, 0, 200, 0.3);
      --shadow-cyan: rgba(0, 212, 255, 0.3);
      --shadow-green: rgba(0, 255, 136, 0.3);
      --input-bg: rgba(10, 10, 20, 0.7);
      --input-border: rgba(180, 0, 255, 0.2);
      --input-focus-bg: rgba(10, 10, 20, 0.9);
      --logo-bg: linear-gradient(135deg, #b400ff, #ff00c8);
      --logo-color: #0a0a12;
      --btn-gradient: linear-gradient(135deg, #ff00c8, #b400ff);
      --btn-gradient-hover: linear-gradient(135deg, #ff44d8, #cc44ff);
      --btn-text: #0a0a12;
      --divider-color: rgba(180, 0, 255, 0.2);
      --toast-bg: rgba(16, 14, 30, 0.95);
      --link-color: #b8a6d6;
      --link-hover: #00d4ff;
      --bg-animated-1: radial-gradient(ellipse at 20% 50%, rgba(180,0,255,0.12) 0%, transparent 60%);
      --bg-animated-2: radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.08) 0%, transparent 50%);
      --bg-animated-3: radial-gradient(ellipse at 50% 100%, rgba(255,0,200,0.08) 0%, transparent 40%);
      --bg-animated-base: #0a0a12;
      --circle-1: radial-gradient(circle, rgba(180,0,255,0.18), transparent 70%);
      --circle-2: radial-gradient(circle, rgba(0,212,255,0.12), transparent 70%);
      --circle-3: radial-gradient(circle, rgba(255,0,200,0.10), transparent 70%);
      --pattern-opacity: 0.06;
      --toast-border-success: rgba(0, 255, 136, 0.3);
      --toast-border-error: rgba(255, 51, 102, 0.3);
      --toast-border-warning: rgba(255, 215, 0, 0.3);
      --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ============================================================
       ESTILOS GERAIS
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      overflow: hidden;
      position: relative;
      transition: background var(--transition);
    }

    /* ===== FUNDO ANIMADO ===== */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--bg-animated-1), var(--bg-animated-2), var(--bg-animated-3), var(--bg-animated-base);
    }

    .bg-animated::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b400ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: var(--pattern-opacity);
    }

    /* ===== CÍRCULOS DECORATIVOS COM EFEITO GLOW ===== */
    .circle {
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(60px);
      animation: floatGlow 8s ease-in-out infinite alternate;
    }
    .circle-1 {
      width: 400px;
      height: 400px;
      top: -120px;
      right: -120px;
      background: var(--circle-1);
      animation-delay: 0s;
    }
    .circle-2 {
      width: 350px;
      height: 350px;
      bottom: -100px;
      left: -100px;
      background: var(--circle-2);
      animation-delay: 2s;
    }
    .circle-3 {
      width: 200px;
      height: 200px;
      top: 40%;
      left: 50%;
      background: var(--circle-3);
      animation-delay: 4s;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      100% { transform: translate(40px, -50px) scale(1.3); opacity: 1; }
    }

    /* ===== EFEITO DE PARTÍCULAS (fundo) ===== */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      animation: particleFloat linear infinite;
      opacity: 0.4;
    }
    .particle:nth-child(1) { background: var(--neon-purple); left: 10%; animation-duration: 15s; animation-delay: 0s; }
    .particle:nth-child(2) { background: var(--neon-pink); left: 25%; animation-duration: 18s; animation-delay: 2s; }
    .particle:nth-child(3) { background: var(--neon-cyan); left: 40%; animation-duration: 12s; animation-delay: 4s; }
    .particle:nth-child(4) { background: var(--neon-green); left: 55%; animation-duration: 20s; animation-delay: 1s; }
    .particle:nth-child(5) { background: var(--neon-gold); left: 70%; animation-duration: 16s; animation-delay: 3s; }
    .particle:nth-child(6) { background: var(--neon-red); left: 85%; animation-duration: 14s; animation-delay: 5s; }
    .particle:nth-child(7) { background: var(--neon-blue); left: 15%; animation-duration: 22s; animation-delay: 7s; }
    .particle:nth-child(8) { background: var(--neon-orange); left: 60%; animation-duration: 17s; animation-delay: 6s; }

    @keyframes particleFloat {
      0% { top: -10px; opacity: 0; transform: translateX(0) scale(0); }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { top: 110vh; opacity: 0; transform: translateX(80px) scale(1.5); }
    }

    /* ===== SELETOR DE TEMAS ===== */
    .theme-selector {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      display: flex;
      gap: 0.6rem;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      padding: 0.5rem 0.7rem;
      border-radius: 3rem;
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 40px rgba(180,0,255,0.06);
      transition: all var(--transition);
    }

    .theme-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0;
      position: relative;
    }

    .theme-btn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 20px var(--shadow-purple);
    }

    .theme-btn.active {
      border-color: var(--neon-gold);
      box-shadow: 0 0 24px rgba(255, 215, 0, 0.3);
    }

    .theme-btn-dark {
      background: #1a1a1a;
      border-color: #3a3a3a;
    }
    .theme-btn-light {
      background: #f5f0e8;
      border-color: #d5c8b8;
    }
    .theme-btn-neon {
      background: linear-gradient(135deg, #b400ff, #ff00c8);
      border-color: #b400ff;
      animation: pulseNeon 2s ease-in-out infinite;
    }

    @keyframes pulseNeon {
      0%, 100% { box-shadow: 0 0 10px rgba(180,0,255,0.3); }
      50% { box-shadow: 0 0 30px rgba(180,0,255,0.6), 0 0 60px rgba(255,0,200,0.3); }
    }

    /* ===== CONTAINER DO LOGIN ===== */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
      animation: fadeNeon 0.8s ease both;
    }

    @keyframes fadeNeon {
      from { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* ===== CARD PRINCIPAL ===== */
    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid var(--border-color);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6),
                  0 0 60px rgba(180, 0, 255, 0.04),
                  inset 0 1px 0 rgba(255,255,255,0.04);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 2rem;
      padding: 1px;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink), var(--neon-cyan), var(--neon-purple));
      background-size: 300% 300%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: borderGlow 4s ease-in-out infinite;
      pointer-events: none;
      opacity: 0.6;
    }

    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7),
                  0 0 80px rgba(180, 0, 255, 0.08),
                  inset 0 1px 0 rgba(255,255,255,0.06);
    }

    /* ===== LOGO COM GLOW ===== */
    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 76px;
      height: 76px;
      background: var(--logo-bg);
      border-radius: 1.5rem;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--logo-color);
      margin-bottom: 0.8rem;
      box-shadow: 0 12px 40px var(--shadow-purple), 0 0 60px rgba(180,0,255,0.15);
      transition: all var(--transition);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 12px 40px var(--shadow-purple), 0 0 60px rgba(180,0,255,0.15); }
      50% { box-shadow: 0 12px 60px var(--shadow-pink), 0 0 100px rgba(255,0,200,0.2); }
    }

    .logo-icon:hover {
      transform: scale(1.08) rotate(-2deg);
      box-shadow: 0 16px 60px var(--shadow-pink), 0 0 80px rgba(255,0,200,0.25);
    }

    .logo-area h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      text-shadow: 0 0 40px rgba(180,0,255,0.15);
    }

    .logo-area h1 .highlight {
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(180,0,255,0.3);
    }

    .logo-area p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
      letter-spacing: 0.12em;
      text-shadow: 0 0 20px rgba(180,0,255,0.08);
    }

    /* ===== DIVISOR NEON ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--neon-purple), transparent);
      opacity: 0.4;
      animation: lineGlow 3s ease-in-out infinite;
    }
    @keyframes lineGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    .divider-text {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      font-weight: 600;
      text-shadow: 0 0 20px rgba(180,0,255,0.1);
    }

    /* ===== CAMPOS ===== */
    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--neon-cyan);
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px rgba(0,212,255,0.15);
      transition: color var(--transition);
    }

    .input-field-wrapper {
      position: relative;
    }

    .input-field-wrapper .icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      opacity: 0.5;
      pointer-events: none;
      transition: all var(--transition);
    }

    .input-field-wrapper:focus-within .icon {
      opacity: 1;
      filter: drop-shadow(0 0 8px var(--neon-cyan));
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 3rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 1rem;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all var(--transition);
    }

    .input-field::placeholder {
      color: var(--text-dim);
      font-weight: 400;
    }

    .input-field:focus {
      border-color: var(--neon-green);
      background: var(--input-focus-bg);
      box-shadow: 0 0 0 4px rgba(0, 255, 136, 0.1), 0 0 30px rgba(0, 255, 136, 0.05);
    }

    .input-field:focus + .icon {
      color: var(--neon-green);
      filter: drop-shadow(0 0 12px var(--neon-green));
    }

    /* ===== OPÇÕES ===== */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0.5rem 0 1.5rem 0;
      font-size: 0.8rem;
    }

    .options-row label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: color var(--transition);
    }
    .options-row label:hover {
      color: var(--neon-cyan);
    }

    .options-row input[type="checkbox"] {
      accent-color: var(--neon-green);
      width: 16px;
      height: 16px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
    }

    .options-row a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all var(--transition);
      font-weight: 500;
      text-shadow: 0 0 20px rgba(0,212,255,0.1);
    }
    .options-row a:hover {
      color: var(--neon-green);
      text-shadow: 0 0 30px rgba(0,255,136,0.3);
    }

    /* ===== BOTÃO NEON ===== */
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: var(--btn-gradient);
      border: none;
      border-radius: 1rem;
      color: var(--btn-text);
      font-weight: 700;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 30px var(--shadow-pink), 0 0 40px rgba(255,0,200,0.1);
      letter-spacing: 0.04em;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
      pointer-events: none;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 1rem;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink), var(--neon-cyan));
      background-size: 200% 200%;
      z-index: -1;
      animation: btnBorderGlow 3s ease-in-out infinite;
      opacity: 0.6;
      filter: blur(4px);
    }

    @keyframes btnBorderGlow {
      0% { background-position: 0% 50%; opacity: 0.4; }
      50% { background-position: 100% 50%; opacity: 0.8; }
      100% { background-position: 0% 50%; opacity: 0.4; }
    }

    .btn-login:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 50px var(--shadow-pink), 0 0 60px rgba(255,0,200,0.2);
      background: var(--btn-gradient-hover);
    }

    .btn-login:active {
      transform: translateY(0px) scale(0.98);
      box-shadow: 0 4px 20px var(--shadow-pink);
    }

    .btn-login .btn-text {
      position: relative;
      z-index: 1;
    }

    /* ===== RODAPÉ ===== */
    .footer-links {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      border-top: 1px solid var(--divider-color);
      padding-top: 1.5rem;
      transition: all var(--transition);
    }

    .footer-links span {
      color: var(--text-dim);
    }

    .footer-links a {
      color: var(--neon-cyan);
      text-decoration: none;
      transition: all var(--transition);
      font-weight: 500;
      text-shadow: 0 0 20px rgba(0,212,255,0.08);
    }
    .footer-links a:hover {
      color: var(--neon-gold);
      text-shadow: 0 0 30px rgba(255,215,0,0.3);
    }

    .footer-links .dot {
      margin: 0 0.6rem;
      opacity: 0.3;
      color: var(--neon-purple);
    }

    .footer-links .brand {
      display: block;
      margin-top: 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      opacity: 0.5;
      transition: color var(--transition);
    }
    .footer-links .brand:hover {
      color: var(--neon-gold);
      opacity: 1;
    }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 360px;
    }

    .toast {
      padding: 0.8rem 1.2rem;
      background: var(--toast-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      color: var(--text-primary);
      font-size: 0.85rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      animation: slideUp 0.4s ease;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: all var(--transition);
    }

    .toast-success { border-color: var(--toast-border-success); box-shadow: 0 0 30px rgba(0,255,136,0.06); }
    .toast-error { border-color: var(--toast-border-error); box-shadow: 0 0 30px rgba(255,51,102,0.06); }
    .toast-warning { border-color: var(--toast-border-warning); box-shadow: 0 0 30px rgba(255,215,0,0.06); }

    @keyframes slideUp {
      from { transform: translateY(30px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* ===== RESPONSIVO ===== */
    @media (max-width: 480px) {
      .theme-selector {
        top: 0.8rem;
        right: 0.8rem;
        padding: 0.4rem 0.5rem;
        gap: 0.4rem;
      }
      .theme-btn {
        width: 30px;
        height: 30px;
      }
      .login-card {
        padding: 1.8rem 1.2rem;
        border-radius: 1.5rem;
      }
      .logo-icon {
        width: 60px;
        height: 60px;
        font-size: 1.6rem;
      }
      .logo-area h1 {
        font-size: 1.3rem;
      }
      .options-row {
        font-size: 0.7rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .btn-login {
        padding: 0.8rem;
        font-size: 0.9rem;
      }
      .circle-1 { width: 200px; height: 200px; }
      .circle-2 { width: 150px; height: 150px; }
      .circle-3 { width: 100px; height: 100px; }
    }

    @media (max-width: 380px) {
      .login-card { padding: 1.2rem 0.8rem; }
      .input-field { padding: 0.6rem 0.8rem 0.6rem 2.5rem; font-size: 0.85rem; }
      .input-field-wrapper .icon { font-size: 0.9rem; left: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- ===== FUNDO ===== -->
  <div class="bg-animated"></div>
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>

  <!-- ===== PARTÍCULAS ===== -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- ===== SELETOR DE TEMAS ===== -->
  <div class="theme-selector" id="themeSelector">
    <button class="theme-btn theme-btn-dark" data-theme="dark" title="Tema Escuro">🌙</button>
    <button class="theme-btn theme-btn-light" data-theme="light" title="Tema Claro">☀️</button>
    <button class="theme-btn theme-btn-neon active" data-theme="neon" title="Tema Neon">💜</button>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ===== LOGIN ===== -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-icon">GC</div>
        <h1>Galego <span class="highlight">Cell</span></h1>
        <p>⚡ SISTEMA DE GESTÃO ⚡</p>
      </div>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">✦ Acesse sua conta ✦</span>
        <span class="divider-line"></span>
      </div>

      <!-- Formulário -->
      <form id="login-form">
        <div class="input-group">
          <label for="email">📧 E-mail</label>
          <div class="input-field-wrapper">
            <input type="email" id="email" class="input-field" placeholder="seu@email.com" required />
            <span class="icon">📧</span>
          </div>
        </div>

        <div class="input-group">
          <label for="password">🔒 Senha</label>
          <div class="input-field-wrapper">
            <input type="password" id="password" class="input-field" placeholder="••••••••" required />
            <span class="icon">🔒</span>
          </div>
        </div>

        <div class="options-row">
          <label>
            <input type="checkbox" id="remember" /> Lembrar-me
          </label>
          <a href="#" id="forgot-password">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn-login">
          <span class="btn-text">✦ ENTRAR ✦</span>
        </button>
      </form>

      <!-- Rodapé -->
      <div class="footer-links">
        <span>⚡ Não tem uma conta?</span>
        <a href="#" id="register-link">Criar conta</a>
        <span class="dot">✦</span>
        <a href="#">Suporte</a>
        <span class="brand">Galego Cell © 2024 • Todos os direitos reservados</span>
      </div>

    </div>
  </div>

  <!-- ============================================================
       SCRIPT
       ============================================================ -->
  <script type="module">
    import { loginUser, registerUser, resetPassword, initAuth } from './js/auth.js';

    // ============================================================
    // SELETOR DE TEMAS
    // ============================================================
    const themeButtons = document.querySelectorAll('.theme-btn');
    const savedTheme = localStorage.getItem('theme') || 'neon';

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      themeButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
      localStorage.setItem('theme', theme);
    }

    themeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        applyTheme(btn.dataset.theme);
      });
    });

    applyTheme(savedTheme);

    // ============================================================
    // TOAST
    // ============================================================
    const toastContainer = document.getElementById('toast-container');

    function showToast(message, type = 'success') {
      const icons = {
        success: '✅',
        error: '❌',
        warning: '⚡'
      };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span>${icons[type] || 'ℹ️'}</span>
        <span>${message}</span>
      `;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // ============================================================
    // LOGIN, CADASTRO, RECUPERAÇÃO
    // ============================================================
    const form = document.getElementById('login-form');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const result = await loginUser(email, password);
      if (result.success) {
        showToast('✅ Login realizado com sucesso!');
        setTimeout(() => window.location.href = 'dashboard.html', 600);
      } else {
        showToast('❌ ' + result.error, 'error');
      }
    });

    document.getElementById('forgot-password').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if (!email) {
        showToast('⚠️ Digite seu e-mail primeiro.', 'warning');
        return;
      }
      const result = await resetPassword(email);
      if (result.success) {
        showToast('📨 E-mail de recuperação enviado!');
      } else {
        showToast('❌ ' + result.error, 'error');
      }
    });

    document.getElementById('register-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = prompt('📧 Digite seu e-mail para criar uma conta:');
      if (!email) return;
      const password = prompt('🔐 Digite uma senha (mínimo 6 caracteres):');
      if (!password || password.length < 6) {
        showToast('⚠️ A senha deve ter pelo menos 6 caracteres.', 'warning');
        return;
      }
      const result = await registerUser(email, password);
      if (result.success) {
        showToast('🎉 Conta criada! Faça login para continuar.');
      } else {
        showToast('❌ ' + result.error, 'error');
      }
    });

    initAuth('dashboard.html');
  </script>

</body>
</html>
