<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GC Manager • Login</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{

font-family:'DM Sans',sans-serif;

background:#050505;

}

.gold{

background:#D4AF37;

}

.gold-text{

color:#D4AF37;

}

.card{

background:#111;

border:1px solid #2c2c2c;

}

input{

background:#1a1a1a;

border:1px solid #333;

color:white;

}

input:focus{

border-color:#D4AF37;

outline:none;

box-shadow:0 0 10px rgba(212,175,55,.4);

}

</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md px-6">

<div class="card rounded-3xl p-8 shadow-2xl">

<div class="text-center">

<img src="img/logo.png"

class="w-24 h-24 mx-auto mb-5 rounded-full object-cover">

<h1 class="text-3xl font-bold gold-text">

GC Manager

</h1>

<p class="text-gray-400 mt-2">

Sistema de Gestão Galego Cell

</p>

</div>

<form id="loginForm" class="mt-8 space-y-5">

<div>

<label class="text-sm text-gray-300">

E-mail

</label>

<input

id="email"

type="email"

placeholder="Digite seu e-mail"

class="w-full mt-2 p-3 rounded-xl">

</div>

<div>

<label class="text-sm text-gray-300">

Senha

</label>

<input

id="password"

type="password"

placeholder="Digite sua senha"

class="w-full mt-2 p-3 rounded-xl">

</div>

<div class="flex items-center justify-between text-sm">

<label class="flex items-center gap-2">

<input type="checkbox">

<span class="text-gray-400">

Lembrar acesso

</span>

</label>

<a href="#" class="gold-text">

Esqueci minha senha

</a>

</div>

<button

type="submit"

class="gold w-full py-3 rounded-xl text-black font-bold text-lg hover:scale-105 transition">

Entrar no Sistema

</button>

</form>

<div class="mt-8 border-t border-gray-700 pt-5 text-center">

<p class="text-gray-500 text-sm">

GC Manager © 2026

</p>

<p class="gold-text text-xs mt-1">

Versão 1.0

</p>

</div>

</div>

</div>

<script>

lucide.createIcons();

document

.getElementById("loginForm")

.addEventListener("submit",function(e){

e.preventDefault();

window.location="index.html";

});

</script>

</body>

</html>
