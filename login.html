<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Galego Cell Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="login-box">
    <div class="logo">
      <h1>Galego Cell</h1>
      <p style="color: var(--text-muted); font-size: 0.85rem;">Sistema de Gestão</p>
    </div>
    <form id="login-form">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" class="input-field" placeholder="seu@email.com" required />
      </div>
      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>
    <div style="margin-top: 1rem; text-align: center; font-size: 0.85rem;">
      <a href="#" id="forgot-password" style="color: var(--text-muted);">Esqueceu a senha?</a>
    </div>
    <div style="margin-top: 1.5rem; text-align: center; border-top: 1px solid var(--border); padding-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">
      Não tem uma conta? <a href="#" id="register-link">Criar conta</a>
    </div>
  </div>
  <script type="module">
    import { loginUser, registerUser, resetPassword, initAuth } from './js/auth.js';
    const form = document.getElementById('login-form');
    function showToast(message, type = 'success') {
      alert(message);
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = await loginUser(email, password);
      if (result.success) {
        showToast('Login realizado com sucesso!');
        setTimeout(() => window.location.href = 'dashboard.html', 500);
      } else {
        showToast('Erro: ' + result.error, 'error');
      }
    });
    document.getElementById('forgot-password').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if (!email) { showToast('Digite seu e-mail primeiro.', 'warning'); return; }
      const result = await resetPassword(email);
      if (result.success) {
        showToast('E-mail de recuperação enviado!');
      } else {
        showToast('Erro: ' + result.error, 'error');
      }
    });
    document.getElementById('register-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = prompt('Digite seu e-mail para criar uma conta:');
      if (!email) return;
      const password = prompt('Digite uma senha (mínimo 6 caracteres):');
      if (!password || password.length < 6) {
        showToast('A senha deve ter pelo menos 6 caracteres.', 'warning');
        return;
      }
      const result = await registerUser(email, password);
      if (result.success) {
        showToast('Conta criada! Faça login para continuar.');
      } else {
        showToast('Erro: ' + result.error, 'error');
      }
    });
    initAuth('dashboard.html');
  </script>
</body>
</html>
