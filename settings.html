<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurações - Gestor PRO+</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-green: #00ff88;
      --neon-cyan: #00d4ff;
      --neon-gold: #ffd700;
      --neon-red: #ff3366;
      --bg: #0a0a12;
      --bg-card: rgba(16, 14, 30, 0.88);
      --border: rgba(0, 255, 136, 0.12);
      --text: #f0eaff;
      --text-muted: #b8a6d6;
      --text-dim: #6a5a8a;
      --shadow: rgba(0, 255, 136, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 3px; }

    .sidebar {
      width: 220px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
    }
    .sidebar-brand {
      padding: 0 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .sidebar-brand .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0a0a12;
    }
    .sidebar-brand h1 { font-size: 1.1rem; font-weight: 800; }
    .sidebar-brand h1 span {
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sidebar-nav {
      flex: 1;
      padding: 0 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }
    .sidebar-nav a:hover { background: rgba(0,255,136,0.06); color: var(--text); }
    .sidebar-nav a.active {
      background: rgba(0,255,136,0.08);
      color: var(--neon-green);
      border-right: 3px solid var(--neon-green);
    }
    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer a {
      color: var(--neon-red);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .sidebar-footer a:hover { color: var(--neon-gold); }

    .main {
      flex: 1;
      padding: 1.5rem;
      overflow-x: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 { font-size: 1.5rem; font-weight: 800; }
    .header h1 span { color: var(--neon-green); }

    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 0.8rem;
      border: none;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'DM Sans', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      color: #0a0a12;
    }
    .btn-primary:hover {
      box-shadow: 0 0 40px rgba(0,255,136,0.3);
      transform: translateY(-2px);
    }

    .settings-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 2rem;
      max-width: 700px;
      transition: all 0.3s ease;
    }
    .settings-card:hover {
      border-color: rgba(0,255,136,0.25);
      box-shadow: 0 0 30px var(--shadow);
    }
    .settings-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--neon-cyan);
    }

    .input-group { margin-bottom: 1.2rem; }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .input-field {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 30px var(--shadow);
    }
    .input-field::placeholder { color: var(--text-dim); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 1rem 0; }
      .sidebar-brand h1, .sidebar-nav a span, .sidebar-footer span { display: none; }
      .sidebar-nav a { justify-content: center; padding: 0.7rem; }
      .sidebar-brand { justify-content: center; padding: 0; }
      .main { padding: 1rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .settings-card { padding: 1.2rem; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">⚡</div>
      <h1>Gestor <span>PRO+</span></h1>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 <span>Dashboard</span></a>
      <a href="services.html">🔧 <span>Ordens de Serviço</span></a>
      <a href="products.html">📦 <span>Produtos</span></a>
      <a href="clients.html">👤 <span>Clientes</span></a>
      <a href="sales.html">💰 <span>Vendas</span></a>
      <a href="fornecedores.html">📦 <span>Fornecedores</span></a>
      <a href="admin.html">👑 <span>Master PRO+</span></a>
      <a href="settings.html" class="active">⚙️ <span>Configurações</span></a>
      <a href="reports.html">📈 <span>Relatórios</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logout-btn">🚪 <span>Sair</span></a>
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <h1>⚙️ <span>Configurações</span></h1>
    </div>

    <div class="settings-card">
      <h2>🏢 Dados da Empresa</h2>
      <form id="settings-form">
        <div class="input-group">
          <label for="settings-company">Nome da Loja *</label>
          <input type="text" id="settings-company" class="input-field" placeholder="Gestor PRO+" required />
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label for="settings-phone">📞 Telefone</label>
            <input type="tel" id="settings-phone" class="input-field" placeholder="(81) 99999-9999" />
          </div>
          <div class="input-group">
            <label for="settings-email">✉️ E-mail</label>
            <input type="email" id="settings-email" class="input-field" placeholder="contato@gestorpro.com" />
          </div>
        </div>
        <div class="input-group">
          <label for="settings-address">📍 Endereço</label>
          <input type="text" id="settings-address" class="input-field" placeholder="Rua, número, bairro, cidade" />
        </div>

        <hr class="divider" />

        <h2 style="color:var(--neon-gold);">📄 Rodapé da Nota</h2>
        <div class="input-group">
          <label for="settings-footer">Mensagem no rodapé</label>
          <input type="text" id="settings-footer" class="input-field" placeholder="Obrigado pela preferência!" />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">💾 Salvar Configurações</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { initApp, handleLogout } from './js/app.js';
    import { initAuth, getCurrentUser } from './js/auth.js';
    import { getSettings, updateSettings } from './js/settings.js';
    import { verificarPlano } from './js/plano.js';

    const form = document.getElementById('settings-form');

    async function loadSettings() {
      const result = await getSettings();
      if (result.success) {
        const data = result.data;
        document.getElementById('settings-company').value = data.companyName || '';
        document.getElementById('settings-phone').value = data.companyPhone || '';
        document.getElementById('settings-email').value = data.companyEmail || '';
        document.getElementById('settings-address').value = data.companyAddress || '';
        document.getElementById('settings-footer').value = data.invoiceFooter || '';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        companyName: document.getElementById('settings-company').value.trim(),
        companyPhone: document.getElementById('settings-phone').value.trim(),
        companyEmail: document.getElementById('settings-email').value.trim(),
        companyAddress: document.getElementById('settings-address').value.trim(),
        invoiceFooter: document.getElementById('settings-footer').value.trim()
      };
      const result = await updateSettings(data);
      if (result.success) {
        alert('✅ Configurações salvas!');
        loadSettings();
      } else {
        alert('❌ Erro: ' + result.error);
      }
    });

    async function init() {
      await initAuth();
      const user = getCurrentUser();
      if (!user) return;
      const plano = await verificarPlano();
      if (plano.status === 'expirado') {
        alert('⚠️ Seu plano expirou! Contrate um novo plano.');
        window.location.href = 'plano.html';
        return;
      }
      initApp();
      await loadSettings();
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
    }
    init();
  </script>

</body>
</html>
