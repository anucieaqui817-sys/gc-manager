<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendas - Galego Cell Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-brand"><h1>Galego Cell</h1></div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html">📊 Dashboard</a>
        <a href="/services.html">🔧 Ordens de Serviço</a>
        <a href="/products.html">📦 Produtos</a>
        <a href="/clients.html">👤 Clientes</a>
        <a href="/sales.html" class="active">💰 Vendas</a>
        <a href="/settings.html">⚙️ Configurações</a>
        <a href="/reports.html">📈 Relatórios</a>
      </nav>
      <div class="sidebar-footer"><a href="#" id="logout-btn" style="color: var(--danger);">🚪 Sair</a></div>
    </aside>
    <main class="main-content">
      <header class="flex-between" style="margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
        <h1>💰 Vendas</h1>
        <button class="btn btn-primary" id="btn-new-sale">+ Nova Venda</button>
      </header>
      <div id="sales-list"><p style="color: var(--text-muted); text-align: center; padding: 2rem;">Carregando...</p></div>
    </main>
  </div>
  <div class="modal-overlay" id="sale-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Nova Venda</h2>
        <button class="modal-close" id="sale-modal-close">✕</button>
      </div>
      <form id="sale-form">
        <div class="input-group">
          <label for="sale-client">Cliente</label>
          <input type="text" id="sale-client" class="input-field" placeholder="Nome do cliente" />
        </div>
        <div class="input-group">
          <label for="sale-items">Itens</label>
          <textarea id="sale-items" class="input-field" placeholder="Ex: Película:2, Capinha:1" rows="2"></textarea>
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label for="sale-total">Total *</label>
            <input type="number" id="sale-total" class="input-field" placeholder="0.00" step="0.01" required />
          </div>
          <div class="input-group">
            <label for="sale-payment">Pagamento</label>
            <select id="sale-payment" class="input-field">
              <option value="Dinheiro">Dinheiro</option>
              <option value="Pix">Pix</option>
              <option value="Cartão Crédito">Cartão Crédito</option>
              <option value="Cartão Débito">Cartão Débito</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Finalizar Venda</button>
      </form>
    </div>
  </div>
  <script type="module">
    import { initApp, subscribe, getState, utils, handleLogout } from './js/app.js';
    import { initAuth, getCurrentUser } from './js/auth.js';
    import { createSale, deleteSale } from './js/sales.js';
    const modal = document.getElementById('sale-modal');
    const form = document.getElementById('sale-form');
    function renderSales() {
      const sales = getState('sales');
      const container = document.getElementById('sales-list');
      if (sales.length === 0) {
        container.innerHTML = `<div style="text-align: center; padding: 3rem; color: var(--text-muted);"><p style="font-size: 3rem;">💰</p><p>Nenhuma venda.</p></div>`;
        return;
      }
      container.innerHTML = sales.map(s => `
        <div class="card" style="margin-bottom: 0.8rem;">
          <div class="flex-between" style="flex-wrap: wrap; gap: 1rem;">
            <div>
              <strong>#${s.id.slice(0,6)}</strong>
              <span style="color: var(--text-muted); margin-left: 0.8rem;">${utils.formatDate(s.createdAt)}</span>
              <p>${s.clientName || 'Balcão'}</p>
              <p style="color: var(--text-muted); font-size: 0.85rem;">${s.items || ''}</p>
            </div>
            <div style="text-align: right;">
              <div style="font-weight: 700; color: var(--gold);">${utils.formatCurrency(s.total)}</div>
              <div style="font-size: 0.8rem; color: var(--text-muted);">${s.paymentMethod || 'Dinheiro'}</div>
              <button class="btn btn-danger btn-sm btn-delete" data-id="${s.id}" style="margin-top: 0.3rem;">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');
      container.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', async () => {
        if (!confirm('Excluir esta venda?')) return;
        const result = await deleteSale(btn.dataset.id);
        if (result.success) alert('Venda excluída!');
        else alert('Erro: ' + result.error);
      }));
    }
    document.getElementById('btn-new-sale').addEventListener('click', () => {
      form.reset();
      modal.classList.add('active');
    });
    document.getElementById('sale-modal-close').addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        clientName: document.getElementById('sale-client').value.trim() || 'Balcão',
        items: document.getElementById('sale-items').value.trim() || 'Venda avulsa',
        total: parseFloat(document.getElementById('sale-total').value) || 0,
        paymentMethod: document.getElementById('sale-payment').value
      };
      const result = await createSale(data);
      if (result.success) {
        modal.classList.remove('active');
        alert('Venda finalizada!');
        renderSales();
      } else alert('Erro: ' + result.error);
    });
    async function init() {
      await initAuth();
      const user = getCurrentUser();
      if (!user) return;
      initApp();
      subscribe('sales', renderSales);
      renderSales();
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
    }
    init();
  </script>
</body>
</html>
