<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Galego Cell Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h1>Galego Cell</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="active">📊 Dashboard</a>
        <a href="/services.html">🔧 Ordens de Serviço</a>
        <a href="/products.html">📦 Produtos</a>
        <a href="/clients.html">👤 Clientes</a>
        <a href="/sales.html">💰 Vendas</a>
        <a href="/settings.html">⚙️ Configurações</a>
        <a href="/reports.html">📈 Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logout-btn" style="color: var(--danger);">🚪 Sair</a>
      </div>
    </aside>
    <main class="main-content">
      <header class="flex-between" style="margin-bottom: 1.5rem;">
        <h1>Dashboard</h1>
        <span id="current-date" style="color: var(--text-muted); font-size: 0.9rem;"></span>
      </header>
      <section class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-services">0</div>
          <div class="stat-label">OS Abertas</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-products">0</div>
          <div class="stat-label">Produtos em Estoque</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-clients">0</div>
          <div class="stat-label">Clientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-sales">R$ 0</div>
          <div class="stat-label">Vendas Hoje</div>
        </div>
      </section>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin: 1rem 0;">
        <a href="/services.html?action=new" class="btn btn-primary" style="justify-content: center; padding: 1rem;">🔧 Nova OS</a>
        <a href="/sales.html?action=new" class="btn btn-primary" style="justify-content: center; padding: 1rem;">💰 Nova Venda</a>
        <a href="/clients.html?action=new" class="btn btn-secondary" style="justify-content: center; padding: 1rem;">👤 Novo Cliente</a>
        <a href="/products.html?action=new" class="btn btn-secondary" style="justify-content: center; padding: 1rem;">📦 Novo Produto</a>
      </div>
      <section class="card" style="margin-top: 1.5rem;">
        <div class="flex-between" style="margin-bottom: 1rem;">
          <h2>Últimas OS</h2>
          <a href="/services.html" style="font-size: 0.85rem;">Ver todas →</a>
        </div>
        <div id="recent-services"><p style="color: var(--text-muted);">Carregando...</p></div>
      </section>
    </main>
  </div>
  <script type="module">
    import { initApp, subscribe, getState, utils, handleLogout } from './js/app.js';
    import { initAuth, getCurrentUser } from './js/auth.js';
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('pt-BR', {
      weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
    });
    function updateStats() {
      const services = getState('services');
      const products = getState('products');
      const clients = getState('clients');
      const openServices = services.filter(s => s.status !== 'Concluído' && s.status !== 'Entregue' && s.status !== 'Cancelado');
      document.getElementById('stat-services').textContent = openServices.length;
      document.getElementById('stat-products').textContent = products.filter(p => (p.stock || 0) > 0).length;
      document.getElementById('stat-clients').textContent = clients.length;
      const today = new Date();
      today.setHours(0,0,0,0);
      const todaySales = getState('sales').filter(s => {
        if (!s.createdAt) return false;
        const d = s.createdAt.toDate ? s.createdAt.toDate() : new Date(s.createdAt);
        d.setHours(0,0,0,0);
        return d.getTime() === today.getTime();
      });
      const total = todaySales.reduce((sum, s) => sum + (s.total || 0), 0);
      document.getElementById('stat-sales').textContent = utils.formatCurrency(total);
    }
    function renderRecentServices() {
      const services = getState('services').slice(0, 5);
      const container = document.getElementById('recent-services');
      if (services.length === 0) {
        container.innerHTML = '<p style="color: var(--text-muted);">Nenhuma OS registrada.</p>';
        return;
      }
      container.innerHTML = services.map(service => `
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border);">
          <div>
            <strong>${service.code || 'OS'}</strong>
            <span style="color: var(--text-muted); margin-left: 0.5rem;">${service.clientName || service.client || 'Cliente'}</span>
          </div>
          <div>
            <span class="badge badge-${service.status?.toLowerCase().replace(' ', '') || 'received'}">${service.status || 'Recebido'}</span>
            <span style="color: var(--text-muted); margin-left: 0.8rem; font-size: 0.8rem;">${utils.formatCurrency(service.total)}</span>
          </div>
        </div>
      `).join('');
    }
    async function init() {
      await initAuth();
      const user = getCurrentUser();
      if (!user) return;
      initApp();
      subscribe('services', () => { renderRecentServices(); updateStats(); });
      subscribe('products', updateStats);
      subscribe('clients', updateStats);
      subscribe('sales', updateStats);
      setTimeout(() => { renderRecentServices(); updateStats(); }, 500);
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
    }
    init();
  </script>
</body>
</html>
