<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Galego Cell</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== TEMA NEON ===== */
    :root {
      --neon-purple: #b400ff;
      --neon-pink: #ff00c8;
      --neon-cyan: #00d4ff;
      --neon-green: #00ff88;
      --neon-gold: #ffd700;
      --neon-red: #ff3366;
      --neon-blue: #4488ff;
      --bg: #0a0a12;
      --bg-card: rgba(16, 14, 30, 0.88);
      --border: rgba(180, 0, 255, 0.15);
      --text: #f0eaff;
      --text-muted: #b8a6d6;
      --text-dim: #6a5a8a;
      --shadow: rgba(180, 0, 255, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 3px; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 220px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
    }
    .sidebar-brand {
      padding: 0 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .sidebar-brand .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0a0a12;
    }
    .sidebar-brand h1 {
      font-size: 1.1rem;
      font-weight: 800;
    }
    .sidebar-brand h1 span {
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sidebar-nav {
      flex: 1;
      padding: 0 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }
    .sidebar-nav a:hover {
      background: rgba(180, 0, 255, 0.08);
      color: var(--text);
    }
    .sidebar-nav a.active {
      background: rgba(180, 0, 255, 0.12);
      color: var(--neon-purple);
      border-right: 3px solid var(--neon-purple);
    }
    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer a {
      color: var(--neon-red);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .sidebar-footer a:hover { color: var(--neon-gold); }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      padding: 1.5rem;
      overflow-x: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 800;
    }
    .header h1 span { color: var(--neon-purple); }
    .header .date {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ===== STATS ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 1.2rem 1.5rem;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      border-color: var(--neon-purple);
      box-shadow: 0 0 30px var(--shadow);
      transform: translateY(-2px);
    }
    .stat-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .stat-card .value.green { background: linear-gradient(135deg, var(--neon-green), #00cc66); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-card .value.cyan { background: linear-gradient(135deg, var(--neon-cyan), #0088ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-card .value.gold { background: linear-gradient(135deg, var(--neon-gold), #ff8800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* ===== ACTIONS ===== */
    .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .actions a {
      padding: 0.8rem 1rem;
      border-radius: 1rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
    }
    .actions a:hover {
      border-color: var(--neon-purple);
      box-shadow: 0 0 30px var(--shadow);
      transform: translateY(-2px);
    }
    .actions a.primary {
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      border: none;
      color: #0a0a12;
    }
    .actions a.primary:hover {
      box-shadow: 0 0 40px rgba(180,0,255,0.3);
    }

    /* ===== TABELAS ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
    }
    .card:hover {
      border-color: rgba(180, 0, 255, 0.25);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .card-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .card-header a {
      color: var(--neon-cyan);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.3s ease;
    }
    .card-header a:hover { color: var(--neon-gold); }

    .os-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .os-item:last-child { border-bottom: none; }
    .os-item .code {
      font-weight: 600;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
    }
    .os-item .client {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .badge {
      padding: 0.2rem 0.7rem;
      border-radius: 50px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-recebido { background: rgba(0, 212, 255, 0.15); color: var(--neon-cyan); }
    .badge-analise { background: rgba(255, 215, 0, 0.15); color: var(--neon-gold); }
    .badge-aprovado { background: rgba(0, 255, 136, 0.15); color: var(--neon-green); }
    .badge-reparo { background: rgba(180, 0, 255, 0.15); color: var(--neon-purple); }
    .badge-concluido { background: rgba(0, 255, 136, 0.1); color: #00cc66; }
    .badge-entregue { background: rgba(0, 212, 255, 0.1); color: #0088ff; }
    .badge-cancelado { background: rgba(255, 51, 102, 0.15); color: var(--neon-red); }

    .os-item .price {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: var(--neon-gold);
    }

    /* ===== RESPONSIVO ===== */
    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 1rem 0; }
      .sidebar-brand h1, .sidebar-nav a span, .sidebar-footer span { display: none; }
      .sidebar-nav a { justify-content: center; padding: 0.7rem; }
      .sidebar-brand { justify-content: center; padding: 0; }
      .main { padding: 1rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .actions { grid-template-columns: 1fr 1fr; }
      .stat-card { padding: 1rem; }
      .stat-card .value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">GC</div>
      <h1>Galego <span>Cell</span></h1>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html" class="active">📊 <span>Dashboard</span></a>
      <a href="/services.html">🔧 <span>Ordens de Serviço</span></a>
      <a href="/products.html">📦 <span>Produtos</span></a>
      <a href="/clients.html">👤 <span>Clientes</span></a>
      <a href="/sales.html">💰 <span>Vendas</span></a>
      <a href="/settings.html">⚙️ <span>Configurações</span></a>
      <a href="/reports.html">📈 <span>Relatórios</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logout-btn">🚪 <span>Sair</span></a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- Header -->
    <div class="header">
      <h1>⚡ <span>Dashboard</span></h1>
      <span class="date" id="current-date"></span>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats-grid">
      <div class="stat-card">
        <div class="value" id="stat-services">0</div>
        <div class="label">🔧 OS Abertas</div>
      </div>
      <div class="stat-card">
        <div class="value green" id="stat-products">0</div>
        <div class="label">📦 Produtos em Estoque</div>
      </div>
      <div class="stat-card">
        <div class="value cyan" id="stat-clients">0</div>
        <div class="label">👤 Clientes</div>
      </div>
      <div class="stat-card">
        <div class="value gold" id="stat-sales">R$ 0</div>
        <div class="label">💰 Vendas Hoje</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <a href="/services.html?action=new" class="primary">🔧 Nova OS</a>
      <a href="/sales.html?action=new" class="primary">💰 Nova Venda</a>
      <a href="/clients.html?action=new">👤 Novo Cliente</a>
      <a href="/products.html?action=new">📦 Novo Produto</a>
    </div>

    <!-- Últimas OS -->
    <div class="card">
      <div class="card-header">
        <h2>📋 Últimas OS</h2>
        <a href="/services.html">Ver todas →</a>
      </div>
      <div id="recent-services">
        <p style="color: var(--text-muted);">Carregando...</p>
      </div>
    </div>

  </main>

  <script type="module">
    import { initApp, subscribe, getState, utils, handleLogout } from './js/app.js';
    import { initAuth, getCurrentUser } from './js/auth.js';

    // Data atual
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('pt-BR', {
      weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
    });

    function updateStats() {
      const services = getState('services');
      const products = getState('products');
      const clients = getState('clients');
      const openServices = services.filter(s => s.status !== 'Concluído' && s.status !== 'Entregue' && s.status !== 'Cancelado');
      document.getElementById('stat-services').textContent = openServices.length;
      document.getElementById('stat-products').textContent = products.filter(p => (p.stock || 0) > 0).length;
      document.getElementById('stat-clients').textContent = clients.length;
      const today = new Date(); today.setHours(0,0,0,0);
      const todaySales = getState('sales').filter(s => {
        if (!s.createdAt) return false;
        const d = s.createdAt.toDate ? s.createdAt.toDate() : new Date(s.createdAt);
        d.setHours(0,0,0,0);
        return d.getTime() === today.getTime();
      });
      document.getElementById('stat-sales').textContent = utils.formatCurrency(todaySales.reduce((sum, s) => sum + (s.total || 0), 0));
    }

    function renderRecentServices() {
      const services = getState('services').slice(0, 5);
      const container = document.getElementById('recent-services');
      if (services.length === 0) {
        container.innerHTML = '<p style="color: var(--text-muted);">Nenhuma OS registrada.</p>';
        return;
      }
      container.innerHTML = services.map(service => `
        <div class="os-item">
          <div>
            <span class="code">${service.code || 'OS'}</span>
            <span class="client">${service.clientName || service.client || 'Cliente'}</span>
          </div>
          <div>
            <span class="badge badge-${service.status?.toLowerCase().replace(' ', '') || 'recebido'}">${service.status || 'Recebido'}</span>
            <span class="price">${utils.formatCurrency(service.total)}</span>
          </div>
        </div>
      `).join('');
    }

    async function init() {
      await initAuth();
      const user = getCurrentUser();
      if (!user) return;
      initApp();
      subscribe('services', () => { renderRecentServices(); updateStats(); });
      subscribe('products', updateStats);
      subscribe('clients', updateStats);
      subscribe('sales', updateStats);
      setTimeout(() => { renderRecentServices(); updateStats(); }, 500);
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
    }
    init();
  </script>

</body>
</html>
