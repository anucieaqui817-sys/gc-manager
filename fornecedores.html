<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fornecedores - Gestor PRO+</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-green: #00ff88;
      --neon-cyan: #00d4ff;
      --neon-gold: #ffd700;
      --neon-red: #ff3366;
      --bg: #0a0a12;
      --bg-card: rgba(16, 14, 30, 0.88);
      --border: rgba(0, 255, 136, 0.12);
      --text: #f0eaff;
      --text-muted: #b8a6d6;
      --text-dim: #6a5a8a;
      --shadow: rgba(0, 255, 136, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 3px; }

    .sidebar {
      width: 220px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
    }
    .sidebar-brand {
      padding: 0 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .sidebar-brand .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0a0a12;
    }
    .sidebar-brand h1 { font-size: 1.1rem; font-weight: 800; }
    .sidebar-brand h1 span {
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sidebar-nav {
      flex: 1;
      padding: 0 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }
    .sidebar-nav a:hover { background: rgba(0,255,136,0.06); color: var(--text); }
    .sidebar-nav a.active {
      background: rgba(0,255,136,0.08);
      color: var(--neon-green);
      border-right: 3px solid var(--neon-green);
    }
    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer a {
      color: var(--neon-red);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .sidebar-footer a:hover { color: var(--neon-gold); }

    .main {
      flex: 1;
      padding: 1.5rem;
      overflow-x: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header h1 { font-size: 1.5rem; font-weight: 800; }
    .header h1 span { color: var(--neon-green); }
    .header-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 0.8rem;
      border: none;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--neon-green), #00cc66);
      color: #0a0a12;
    }
    .btn-primary:hover {
      box-shadow: 0 0 40px rgba(0,255,136,0.3);
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--neon-green);
      box-shadow: 0 0 30px var(--shadow);
    }
    .btn-danger {
      background: rgba(255,51,102,0.15);
      color: var(--neon-red);
      border: 1px solid rgba(255,51,102,0.2);
    }
    .btn-danger:hover {
      background: rgba(255,51,102,0.25);
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--neon-gold), #ff8800);
      color: #0a0a12;
    }
    .btn-gold:hover {
      box-shadow: 0 0 40px rgba(255,215,0,0.3);
      transform: translateY(-2px);
    }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }

    .input-field {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 30px var(--shadow);
    }
    .input-field::placeholder { color: var(--text-dim); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .fornecedor-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 1.2rem 1.5rem;
      margin-bottom: 0.8rem;
      transition: all 0.3s ease;
    }
    .fornecedor-card:hover {
      border-color: rgba(0,255,136,0.25);
      box-shadow: 0 0 30px var(--shadow);
    }
    .fornecedor-card .header-card {
      display: flex;
      justify-content: space-between;
      align-items: start;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .fornecedor-card .nome {
      font-weight: 700;
      font-size: 1.05rem;
    }
    .fornecedor-card .documento {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .fornecedor-card .contato {
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .fornecedor-card .credito {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: var(--neon-gold);
    }
    .fornecedor-card .acoes {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal.active {
      opacity: 1;
      visibility: visible;
    }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      max-width: 550px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    .modal.active .modal-content { transform: scale(1); }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 1.2rem; font-weight: 700; }
    .modal-header h2 span { color: var(--neon-green); }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s ease;
    }
    .modal-close:hover { color: var(--text); }

    .input-group { margin-bottom: 1rem; }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 1rem 0; }
      .sidebar-brand h1, .sidebar-nav a span, .sidebar-footer span { display: none; }
      .sidebar-nav a { justify-content: center; padding: 0.7rem; }
      .sidebar-brand { justify-content: center; padding: 0; }
      .main { padding: 1rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .modal-content { padding: 1.2rem; }
      .fornecedor-card .header-card { flex-direction: column; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">⚡</div>
      <h1>Gestor <span>PRO+</span></h1>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html">📊 <span>Dashboard</span></a>
      <a href="/services.html">🔧 <span>Ordens de Serviço</span></a>
      <a href="/products.html">📦 <span>Produtos</span></a>
      <a href="/clients.html">👤 <span>Clientes</span></a>
      <a href="/sales.html">💰 <span>Vendas</span></a>
      <a href="/fornecedores.html" class="active">📦 <span>Fornecedores</span></a>
      <a href="/admin.html">👑 <span>Master PRO+</span></a>
      <a href="/settings.html">⚙️ <span>Configurações</span></a>
      <a href="/reports.html">📈 <span>Relatórios</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logout-btn">🚪 <span>Sair</span></a>
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <h1>📦 <span>Fornecedores</span></h1>
      <div class="header-actions">
        <button class="btn btn-primary" id="btn-novo-fornecedor">➕ Novo Fornecedor</button>
        <button class="btn btn-gold" id="btn-nova-compra">🛒 Nova Compra</button>
      </div>
    </div>

    <div id="fornecedores-list">
      <div class="empty-state"><div class="icon">📦</div><p>Carregando fornecedores...</p></div>
    </div>
  </main>

  <!-- Modal Fornecedor -->
  <div class="modal" id="modal-fornecedor">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-fornecedor-title">Novo <span>Fornecedor</span></h2>
        <button class="modal-close" id="modal-fornecedor-close">✕</button>
      </div>
      <form id="form-fornecedor">
        <div class="input-group">
          <label for="fornecedor-nome">🏢 Nome do Fornecedor *</label>
          <input type="text" id="fornecedor-nome" class="input-field" placeholder="Nome do fornecedor" required />
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label for="fornecedor-documento">📄 CNPJ</label>
            <input type="text" id="fornecedor-documento" class="input-field" placeholder="00.000.000/0000-00" />
          </div>
          <div class="input-group">
            <label for="fornecedor-telefone">📞 Telefone</label>
            <input type="tel" id="fornecedor-telefone" class="input-field" placeholder="(81) 99999-9999" />
          </div>
        </div>
        <div class="input-group">
          <label for="fornecedor-email">✉️ E-mail</label>
          <input type="email" id="fornecedor-email" class="input-field" placeholder="contato@fornecedor.com" />
        </div>
        <div class="input-group">
          <label for="fornecedor-endereco">📍 Endereço</label>
          <input type="text" id="fornecedor-endereco" class="input-field" placeholder="Rua, número, bairro, cidade" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">💾 Salvar Fornecedor</button>
      </form>
    </div>
  </div>

  <!-- Modal Compra -->
  <div class="modal" id="modal-compra">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🛒 Nova <span>Compra</span></h2>
        <button class="modal-close" id="modal-compra-close">✕</button>
      </div>
      <form id="form-compra">
        <div class="input-group">
          <label for="compra-fornecedor">🏢 Fornecedor *</label>
          <select id="compra-fornecedor" class="input-field" required>
            <option value="">Selecione um fornecedor...</option>
          </select>
        </div>
        <div class="input-group">
          <label for="compra-produto">📦 Produto/Peça *</label>
          <input type="text" id="compra-produto" class="input-field" placeholder="Ex: Tela iPhone 12" required />
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label for="compra-quantidade">📊 Quantidade *</label>
            <input type="number" id="compra-quantidade" class="input-field" placeholder="1" min="1" required />
          </div>
          <div class="input-group">
            <label for="compra-valor">💰 Valor Unitário *</label>
            <input type="number" id="compra-valor" class="input-field" placeholder="0.00" step="0.01" required />
          </div>
        </div>
        <div class="input-group">
          <label for="compra-obs">📝 Observações</label>
          <textarea id="compra-obs" class="input-field" placeholder="Observações sobre a compra..." rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">💾 Registrar Compra</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initApp, utils, handleLogout } from './js/app.js';
    import { initAuth, getCurrentUser } from './js/auth.js';
    import { db, collection, doc, getDocs, setDoc, updateDoc, deleteDoc, serverTimestamp } from './js/firebase.js';

    let fornecedores = [];

    // Carregar fornecedores
    async function carregarFornecedores() {
      try {
        const ref = collection(db, 'fornecedores');
        const snapshot = await getDocs(ref);
        fornecedores = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));
        renderFornecedores();
      } catch (error) {
        console.error('Erro ao carregar fornecedores:', error);
      }
    }

    // Renderizar fornecedores
    function renderFornecedores() {
      const container = document.getElementById('fornecedores-list');
      if (fornecedores.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>Nenhum fornecedor cadastrado.</p><button class="btn btn-primary" style="margin-top:1rem;" onclick="document.getElementById('btn-novo-fornecedor').click()">Cadastrar Fornecedor</button></div>`;
        return;
      }

      container.innerHTML = fornecedores.map(f => `
        <div class="fornecedor-card">
          <div class="header-card">
            <div>
              <div class="nome">${f.nome}</div>
              <div class="documento">${f.documento || 'Sem CNPJ'}</div>
              <div class="contato">${f.telefone || ''} ${f.email ? '• ' + f.email : ''}</div>
              ${f.endereco ? `<div class="contato">📍 ${f.endereco}</div>` : ''}
            </div>
            <div style="text-align:right;">
              <div class="credito">💰 ${utils.formatCurrency(f.credito || 0)}</div>
              <div style="font-size:0.7rem;color:var(--text-dim);">Crédito disponível</div>
            </div>
          </div>
          <div class="acoes">
            <button class="btn btn-secondary btn-sm btn-comprar" data-id="${f.id}">🛒 Comprar</button>
            <button class="btn btn-gold btn-sm btn-devolver" data-id="${f.id}">🔄 Devolução</button>
            <button class="btn btn-danger btn-sm btn-excluir" data-id="${f.id}">🗑️</button>
          </div>
          ${f.compras && f.compras.length > 0 ? `
            <div style="margin-top:0.8rem;border-top:1px solid var(--border);padding-top:0.8rem;font-size:0.8rem;color:var(--text-dim);">
              📋 Últimas compras: ${f.compras.slice(-3).map(c => `${c.produto} (${c.quantidade}x)`).join(', ')}
            </div>
          ` : ''}
        </div>
      `).join('');

      // Eventos
      container.querySelectorAll('.btn-comprar').forEach(btn => {
        btn.addEventListener('click', () => abrirModalCompra(btn.dataset.id));
      });
      container.querySelectorAll('.btn-devolver').forEach(btn => {
        btn.addEventListener('click', () => devolverProduto(btn.dataset.id));
      });
      container.querySelectorAll('.btn-excluir').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Excluir este fornecedor?')) return;
          await deleteDoc(doc(db, 'fornecedores', btn.dataset.id));
          carregarFornecedores();
        });
      });
    }

    // Abrir modal compra
    async function abrirModalCompra(fornecedorId = null) {
      const modal = document.getElementById('modal-compra');
      const select = document.getElementById('compra-fornecedor');
      
      select.innerHTML = '<option value="">Selecione um fornecedor...</option>';
      fornecedores.forEach(f => {
        select.innerHTML += `<option value="${f.id}" ${f.id === fornecedorId ? 'selected' : ''}>${f.nome}</option>`;
      });
      
      document.getElementById('compra-produto').value = '';
      document.getElementById('compra-quantidade').value = '1';
      document.getElementById('compra-valor').value = '';
      document.getElementById('compra-obs').value = '';
      
      modal.classList.add('active');
    }

    // Devolução
    async function devolverProduto(fornecedorId) {
      const fornecedor = fornecedores.find(f => f.id === fornecedorId);
      if (!fornecedor) return;

      const produto = prompt('📦 Qual produto/peça está devolvendo?');
      if (!produto) return;
      const quantidade = parseInt(prompt('📊 Quantidade?'));
      if (!quantidade || quantidade < 1) return;
      const motivo = prompt('📝 Motivo da devolução:');

      const credito = quantidade * 50; // Exemplo: crédito de R$ 50 por peça devolvida

      const ref = doc(db, 'fornecedores', fornecedorId);
      const compras = fornecedor.compras || [];
      compras.push({
        tipo: 'devolucao',
        produto,
        quantidade,
        motivo: motivo || 'Sem motivo informado',
        credito: credito,
        data: new Date().toISOString()
      });

      await updateDoc(ref, {
        compras: compras,
        credito: (fornecedor.credito || 0) + credito,
        updatedAt: serverTimestamp()
      });

      alert(`✅ Devolução registrada!\n💰 Crédito gerado: R$ ${credito.toFixed(2)}`);
      carregarFornecedores();
    }

    // Modal Fornecedor
    document.getElementById('btn-novo-fornecedor').addEventListener('click', () => {
      document.getElementById('modal-fornecedor-title').innerHTML = 'Novo <span>Fornecedor</span>';
      document.getElementById('form-fornecedor').reset();
      document.getElementById('modal-fornecedor').classList.add('active');
    });

    document.getElementById('modal-fornecedor-close').addEventListener('click', () => {
      document.getElementById('modal-fornecedor').classList.remove('active');
    });

    document.getElementById('form-fornecedor').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        nome: document.getElementById('fornecedor-nome').value.trim(),
        documento: document.getElementById('fornecedor-documento').value.trim(),
        telefone: document.getElementById('fornecedor-telefone').value.trim(),
        email: document.getElementById('fornecedor-email').value.trim(),
        endereco: document.getElementById('fornecedor-endereco').value.trim(),
        credito: 0,
        compras: [],
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      };

      const ref = doc(collection(db, 'fornecedores'));
      await setDoc(ref, data);
      document.getElementById('modal-fornecedor').classList.remove('active');
      alert('✅ Fornecedor cadastrado com sucesso!');
      carregarFornecedores();
    });

    // Modal Compra
    document.getElementById('btn-nova-compra').addEventListener('click', () => abrirModalCompra());

    document.getElementById('modal-compra-close').addEventListener('click', () => {
      document.getElementById('modal-compra').classList.remove('active');
    });

    document.getElementById('form-compra').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fornecedorId = document.getElementById('compra-fornecedor').value;
      if (!fornecedorId) { alert('⚠️ Selecione um fornecedor!'); return; }

      const fornecedor = fornecedores.find(f => f.id === fornecedorId);
      if (!fornecedor) return;

      const produto = document.getElementById('compra-produto').value.trim();
      const quantidade = parseInt(document.getElementById('compra-quantidade').value) || 1;
      const valor = parseFloat(document.getElementById('compra-valor').value) || 0;
      const obs = document.getElementById('compra-obs').value.trim();

      const total = quantidade * valor;

      const compras = fornecedor.compras || [];
      compras.push({
        tipo: 'compra',
        produto,
        quantidade,
        valor,
        total,
        obs: obs || '',
        data: new Date().toISOString()
      });

      const ref = doc(db, 'fornecedores', fornecedorId);
      await updateDoc(ref, {
        compras: compras,
        updatedAt: serverTimestamp()
      });

      document.getElementById('modal-compra').classList.remove('active');
      alert(`✅ Compra registrada!\n📦 ${produto} x${quantidade}\n💰 Total: R$ ${total.toFixed(2)}`);
      carregarFornecedores();
    });

    // Init
    async function init() {
      await initAuth();
      const user = getCurrentUser();
      if (!user) return;
      initApp();
      await carregarFornecedores();
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
    }
    init();
  </script>

</body>
</html>
